name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release gate
    runs-on: ubuntu-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Release workflow must run on a tag ref like v0.1.1."
            echo "Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check npm package versions
        run: npm run check:npm-versions

      - name: Run strict Rust gate
        run: npm run check:strict

  build-platform-package:
    needs: verify
    name: Build ${{ matrix.package_dir }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            package_dir: markast-darwin-arm64
            binary_ext: ''
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            package_dir: markast-darwin-x64
            binary_ext: ''
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_dir: markast-linux-x64-gnu
            binary_ext: ''
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package_dir: markast-linux-arm64-gnu
            binary_ext: ''
            linker: aarch64-linux-gnu-gcc
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            package_dir: markast-win32-x64-msvc
            binary_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check npm package versions
        run: npm run check:npm-versions

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Stage platform package
        shell: bash
        run: |
          node scripts/stage-npm-binary.mjs \
            "npm/${{ matrix.package_dir }}" \
            "target/${{ matrix.target }}/release/markast${{ matrix.binary_ext }}"

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_dir }}
          path: npm/${{ matrix.package_dir }}
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: build-platform-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Check npm package versions
        run: npm run check:npm-versions

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Download platform package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/platform-packages

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          while IFS= read -r package_json; do
            dir="$(dirname "$package_json")"
            name="$(node -p "require(require('path').resolve(process.argv[1])).name" "$package_json")"
            version="$(node -p "require(require('path').resolve(process.argv[1])).version" "$package_json")"

            if npm view "${name}@${version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published"
              continue
            fi

            echo "Publishing ${name}@${version}"
            if [ "$name" != "markast-win32-x64-msvc" ]; then
              chmod +x "$dir/bin/markast"
            fi
            npm publish "$dir" --access public --provenance
          done < <(find dist/platform-packages -name package.json -not -path '*/node_modules/*' | sort)

      - name: Publish main package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          if npm view "${name}@${version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Skipping ${name}@${version}; already published"
            exit 0
          fi

          npm publish --access public --provenance

      - name: Deprecate holding package version
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          pkg="markast-win32-x64-msvc"
          ver="0.0.1-security"
          msg="Security holding version; do not use. Install markast instead."

          if ! npm view "${pkg}@${ver}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "No ${pkg}@${ver} found; skipping"
            exit 0
          fi

          current="$(npm view "${pkg}@${ver}" deprecated --registry=https://registry.npmjs.org 2>/dev/null || true)"
          if [ "${current}" = "${msg}" ]; then
            echo "${pkg}@${ver} already deprecated; skipping"
            exit 0
          fi

          if ! npm deprecate "${pkg}@${ver}" "${msg}" --registry=https://registry.npmjs.org; then
            echo "::warning::Failed to deprecate ${pkg}@${ver}; continuing"
          fi

  smoke-install:
    name: Smoke install (${{ matrix.runner }})
    needs: publish-npm
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform_pkg: markast-linux-x64-gnu
          - runner: windows-latest
            platform_pkg: markast-win32-x64-msvc
          - runner: macos-14
            platform_pkg: markast-darwin-arm64
          - runner: macos-15-intel
            platform_pkg: markast-darwin-x64

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install markast from npm
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          echo "MARKAST_VERSION=${VERSION}" >> "${GITHUB_ENV}"

          for i in {1..30}; do
            if npm view "markast@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for markast@${VERSION} to be available on npm (${i}/30)..."
            sleep 5
          done

          npm view "markast@${VERSION}" version --registry=https://registry.npmjs.org

          mkdir smoke
          cd smoke
          npm init -y >/dev/null 2>&1
          npm i "markast@${VERSION}" --no-audit --no-fund

      - name: Verify platform package installed
        shell: bash
        env:
          MARKAST_PLATFORM_PKG: ${{ matrix.platform_pkg }}
        run: |
          set -euo pipefail
          cd smoke
          node -e "const { createRequire } = require('node:module'); const pkg = process.env.MARKAST_PLATFORM_PKG; const markastRequire = createRequire(require.resolve('markast/package.json')); try { const resolved = markastRequire.resolve(pkg + '/package.json'); console.log('Resolved ' + pkg + ': ' + resolved); } catch (e) { console.error('Missing optional platform package: ' + pkg); console.error(e && e.message ? e.message : String(e)); process.exit(1); }"

      - name: Run markast CLI
        shell: bash
        run: |
          set -euo pipefail
          cd smoke
          node node_modules/markast/bin/markast.js --help >/dev/null
          node -e "const { spawnSync } = require('node:child_process'); const res = spawnSync('node', ['node_modules/markast/bin/markast.js', '--document'], { input: '# hi\\n', encoding: 'utf8' }); if (res.status !== 0) { console.error(res.stdout); console.error(res.stderr); process.exit(res.status || 1); } if (!res.stdout.includes('<h1')) { console.error('Unexpected output from markast'); console.error(res.stdout.slice(0, 200)); process.exit(1); } console.log('ok');"
